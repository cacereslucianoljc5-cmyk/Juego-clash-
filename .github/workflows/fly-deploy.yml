name: Deploy to Fly.io

# Runs on every push to the default branch. Requires a repository secret
# named FLY_API_TOKEN (create it with:  fly tokens create deploy -x 999999h).
on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FLY_APP_NAME: juego-clash

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Ensure app exists
        run: flyctl apps create "$FLY_APP_NAME" --org personal || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
