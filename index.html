<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Clash 3D — Batalla en la Arena</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: system-ui, sans-serif; background: #0b1021; touch-action: none; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  #loading {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    background: #0b1021; color: #cbd5e1; z-index: 30; transition: opacity .4s;
  }
  #loading.hide { opacity: 0; pointer-events: none; }
  #loading .bar { width: 260px; height: 8px; border-radius: 6px; background: #1e293b; overflow: hidden; }
  #loading .bar > span { display: block; height: 100%; width: 0; background: linear-gradient(90deg,#38bdf8,#818cf8); transition: width .2s; }

  #hud {
    position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 14px; align-items: center; z-index: 10;
    background: rgba(15,23,42,.78); border: 1px solid rgba(148,163,184,.25);
    padding: 6px 16px; border-radius: 20px; color: #e2e8f0; font-size: 14px; font-weight: 700;
  }
  #timer { color: #fbbf24; min-width: 44px; text-align: center; }

  #hint {
    position: fixed; top: 54px; left: 50%; transform: translateX(-50%);
    color: #94a3b8; font-size: 12px; background: rgba(15,23,42,.6);
    padding: 4px 12px; border-radius: 16px; z-index: 10; pointer-events: none;
  }

  #bottombar {
    position: fixed; left: 50%; bottom: 10px; transform: translateX(-50%);
    display: flex; flex-direction: column; gap: 6px; z-index: 10; width: min(96vw, 640px);
  }
  #elixirWrap {
    height: 16px; border-radius: 10px; background: rgba(15,23,42,.85);
    border: 1px solid rgba(148,163,184,.3); overflow: hidden; position: relative;
  }
  #elixirFill { height: 100%; width: 50%; background: linear-gradient(90deg,#c026d3,#e879f9); transition: width .2s; }
  #elixirNum {
    position: absolute; inset: 0; display: grid; place-items: center;
    color: #fff; font-size: 11px; font-weight: 800; text-shadow: 0 1px 2px #0008;
  }
  #deck {
    display: flex; gap: 6px; padding: 8px; overflow-x: auto;
    background: rgba(15,23,42,.82); border: 1px solid rgba(148,163,184,.25);
    border-radius: 14px; backdrop-filter: blur(8px);
  }
  .card {
    flex: 1 0 58px; padding: 7px 4px 6px; border-radius: 10px; position: relative;
    background: linear-gradient(180deg,#1e293b,#0f172a); border: 2px solid transparent;
    color: #e2e8f0; font-size: 10.5px; font-weight: 600; text-align: center; cursor: pointer;
    transition: transform .12s, border-color .12s, opacity .12s; user-select: none;
  }
  .card:hover { transform: translateY(-3px); }
  .card.active { border-color: #38bdf8; box-shadow: 0 0 0 3px rgba(56,189,248,.25); }
  .card.poor { opacity: .45; }
  .card .ico { font-size: 19px; display: block; margin-bottom: 1px; }
  .card .cost {
    position: absolute; top: -6px; left: -5px; width: 19px; height: 19px;
    border-radius: 50%; background: radial-gradient(circle at 35% 30%,#e879f9,#a21caf);
    color: #fff; font-size: 11px; font-weight: 800; display: grid; place-items: center;
    border: 1.5px solid #f5d0fe;
  }

  #result {
    position: fixed; inset: 0; display: grid; place-items: center; z-index: 20;
    background: rgba(2,6,23,.6); opacity: 0; pointer-events: none; transition: opacity .4s;
  }
  #result.show { opacity: 1; pointer-events: auto; }
  #result .panel {
    background: #0f172a; border: 1px solid rgba(148,163,184,.3); border-radius: 18px;
    padding: 34px 46px; text-align: center; color: #e2e8f0;
  }
  #resultText { font-size: 30px; font-weight: 800; margin-bottom: 18px; }
  #replay {
    background: linear-gradient(180deg,#38bdf8,#2563eb); border: 0; color: #fff;
    font-size: 15px; font-weight: 700; padding: 10px 26px; border-radius: 12px; cursor: pointer;
  }
</style>
</head>
<body>
<div id="app"></div>

<div id="loading">
  <div style="font-size:22px;font-weight:800;color:#e2e8f0">⚔️ Clash 3D</div>
  <div class="bar"><span id="progress"></span></div>
  <div id="loadtext">Cargando modelos…</div>
</div>

<div id="hud">
  <span id="crowns">👑 0 — 0 👑</span>
  <span id="timer">3:00</span>
</div>
<div id="hint">Elige una carta del mazo</div>

<div id="bottombar">
  <div id="elixirWrap"><div id="elixirFill"></div><div id="elixirNum">5</div></div>
  <div id="deck"></div>
</div>

<div id="result">
  <div class="panel">
    <div id="resultText"></div>
    <button id="replay">Jugar otra vez</button>
  </div>
</div>

<script type="importmap">
  { "imports": { "three": "./lib/three.module.js" } }
</script>
<script type="module" src="./js/game.js?v=2"></script>
</body>
</html>
