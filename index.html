<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Clash 3D — Batalla en la Arena</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23e2e8f0' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='14.5 17.5 3 6 3 3 6 3 17.5 14.5'/><line x1='13' x2='19' y1='19' y2='13'/><line x1='16' x2='20' y1='16' y2='20'/><line x1='19' x2='21' y1='21' y2='19'/><polyline points='14.5 6.5 18 3 21 3 21 6 17.5 9.5'/><line x1='5' x2='9' y1='14' y2='18'/><line x1='7' x2='4' y1='17' y2='20'/><line x1='3' x2='5' y1='19' y2='21'/></svg>" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: system-ui, sans-serif; background: #0b1021; touch-action: none; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  #loading {
    position: fixed; inset: 0; z-index: 30; overflow: hidden;
    background: #241a2e; transition: opacity .5s;
  }
  #loading.hide { opacity: 0; pointer-events: none; }

  /* relleno desenfocado para cubrir los bordes sin cortar personajes */
  #loading::before {
    content: ''; position: absolute; inset: -6%;
    background: url(./cards/loading_screen.webp?v=9) center/cover no-repeat;
    filter: blur(26px) saturate(1.1) brightness(.55);
    transform: scale(1.12);
  }
  /* imagen completa (contain): siempre se ven TODOS los personajes */
  #loading .scene {
    position: absolute; inset: 0;
    background: url(./cards/loading_screen.webp?v=9) center/contain no-repeat;
    filter: saturate(1.05);
    animation: lz 14s ease-in-out infinite alternate;
  }
  @keyframes lz {
    from { transform: translateY(0); }
    to   { transform: translateY(-1.2%); }
  }
  /* oscurecido inferior para que resalten personajes y barra */
  #loading .vig {
    position: absolute; inset: 0;
    background:
      radial-gradient(120% 80% at 50% 24%, transparent 40%, rgba(6,16,38,.35) 100%),
      linear-gradient(180deg, rgba(6,16,38,.12) 0%, transparent 22%, transparent 46%, rgba(6,16,38,.72) 100%);
  }

  /* barra de carga estilo Clash */
  #loading .loadbar {
    position: absolute; left: 50%; bottom: 42px; transform: translateX(-50%);
    width: min(78vw, 420px);
  }
  #loading .track {
    height: 22px; border-radius: 14px; padding: 3px;
    background: linear-gradient(180deg,#101a33,#1b2b4d);
    border: 2px solid #0a1330; box-shadow: 0 3px 0 rgba(0,0,0,.4), inset 0 2px 4px rgba(0,0,0,.6);
  }
  #loading .fill {
    height: 100%; width: 0%; border-radius: 10px;
    background: linear-gradient(180deg,#ffe066 0%,#ffb020 55%,#e07a12 100%);
    box-shadow: inset 0 2px 3px rgba(255,255,255,.6), inset 0 -3px 5px rgba(150,60,0,.5);
    transition: width .25s ease-out; position: relative; overflow: hidden;
  }
  #loading .fill::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(100deg, transparent 30%, rgba(255,255,255,.55) 50%, transparent 70%);
    transform: translateX(-100%); animation: shine 1.4s linear infinite;
  }
  @keyframes shine { to { transform: translateX(120%); } }
  #loading .pct {
    text-align: center; margin-top: 8px; color: #fff;
    font-size: 13px; font-weight: 800; letter-spacing: .5px;
    text-shadow: 0 2px 4px rgba(0,0,0,.7);
  }
  #loading .dots::after { content: ''; animation: dots 1.2s steps(4) infinite; }
  @keyframes dots { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }

  #hud {
    position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 14px; align-items: center; z-index: 10;
    background: rgba(15,23,42,.78); border: 1px solid rgba(148,163,184,.25);
    padding: 6px 16px; border-radius: 20px; color: #e2e8f0; font-size: 14px; font-weight: 700;
  }
  #timer { color: #fbbf24; min-width: 44px; text-align: center; }
  #crowns { display: inline-flex; align-items: center; gap: 5px; }
  #crowns svg { color: #fbbf24; }

  #hint {
    position: fixed; top: 54px; left: 50%; transform: translateX(-50%);
    color: #94a3b8; font-size: 12px; background: rgba(15,23,42,.6);
    padding: 4px 12px; border-radius: 16px; z-index: 10; pointer-events: none;
  }

  #bottombar {
    position: fixed; left: 50%; bottom: 10px; transform: translateX(-50%);
    display: flex; flex-direction: column; gap: 6px; z-index: 10; width: min(96vw, 640px);
  }
  #elixirWrap {
    height: 16px; border-radius: 10px; background: rgba(15,23,42,.85);
    border: 1px solid rgba(148,163,184,.3); overflow: hidden; position: relative;
  }
  #elixirFill { height: 100%; width: 50%; background: linear-gradient(90deg,#c026d3,#e879f9); transition: width .2s; }
  #elixirNum {
    position: absolute; inset: 0; display: grid; place-items: center;
    color: #fff; font-size: 11px; font-weight: 800; text-shadow: 0 1px 2px #0008;
  }
  #deck {
    display: flex; gap: 6px; padding: 8px; overflow-x: auto;
    background: rgba(15,23,42,.82); border: 1px solid rgba(148,163,184,.25);
    border-radius: 14px; backdrop-filter: blur(8px);
  }
  .card {
    flex: 0 0 76px; aspect-ratio: 4 / 5; border-radius: 12px; position: relative;
    background-color: #1e293b; background-size: cover; background-position: center;
    border: 2px solid #8b5cf6; overflow: hidden; padding: 0;
    color: #e2e8f0; font-size: 10.5px; font-weight: 700; text-align: center; cursor: pointer;
    transition: transform .12s, border-color .12s, opacity .12s, box-shadow .12s;
    user-select: none; box-shadow: 0 2px 6px rgba(0,0,0,.4);
  }
  .card:hover { transform: translateY(-5px) scale(1.04); border-color: #a78bfa; }
  .card.active {
    border-color: #38bdf8;
    box-shadow: 0 0 0 3px rgba(56,189,248,.35), 0 4px 14px rgba(56,189,248,.3);
    transform: translateY(-5px);
  }
  .card.poor { opacity: .45; filter: grayscale(.5); }
  .card .cname {
    position: absolute; left: 0; right: 0; bottom: 0; padding: 10px 2px 4px;
    background: linear-gradient(180deg, transparent, rgba(2,6,23,.88) 62%);
    text-shadow: 0 1px 2px #000;
  }
  .card .cost {
    position: absolute; top: 3px; left: 3px; width: 20px; height: 20px;
    border-radius: 50% 50% 50% 6px; background: radial-gradient(circle at 35% 30%,#e879f9,#a21caf);
    color: #fff; font-size: 11.5px; font-weight: 800; display: grid; place-items: center;
    border: 1.5px solid #f5d0fe; box-shadow: 0 1px 3px rgba(0,0,0,.5);
  }

  #result {
    position: fixed; inset: 0; display: grid; place-items: center; z-index: 20;
    background: rgba(2,6,23,.6); opacity: 0; pointer-events: none; transition: opacity .4s;
  }
  #result.show { opacity: 1; pointer-events: auto; }
  #result .panel {
    background: #0f172a; border: 1px solid rgba(148,163,184,.3); border-radius: 18px;
    padding: 34px 46px; text-align: center; color: #e2e8f0;
  }
  #resultText {
    font-size: 30px; font-weight: 800; margin-bottom: 18px;
    display: flex; align-items: center; justify-content: center; gap: 12px;
  }
  #resultText svg { color: #fbbf24; }
  #replay {
    background: linear-gradient(180deg,#38bdf8,#2563eb); border: 0; color: #fff;
    font-size: 15px; font-weight: 700; padding: 10px 26px; border-radius: 12px; cursor: pointer;
  }

  /* ============ MENÚ PRINCIPAL ============ */
  #menu { position: fixed; inset: 0; z-index: 60; overflow: hidden; background: #241a2e; }
  #menu.hide { display: none; }
  #menu .menu-blur {
    position: absolute; inset: -6%;
    background: url(./cards/menu_bg.webp?v=1) center/cover no-repeat;
    filter: blur(28px) brightness(.5) saturate(1.1); transform: scale(1.12);
  }
  #menu .menu-frame {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    aspect-ratio: 768 / 950;
    height: min(100vh, calc(100vw * 950 / 768)); width: auto;
    background: url(./cards/menu_bg.webp?v=1) center / 100% 100% no-repeat;
    box-shadow: 0 12px 60px rgba(0,0,0,.6);
  }
  /* zonas clicables transparentes alineadas sobre los botones dibujados en la imagen */
  #menu .hot {
    position: absolute; border: 0; background: transparent; cursor: pointer;
    border-radius: 16px; -webkit-tap-highlight-color: transparent;
    transition: transform .1s ease, filter .1s ease;
  }
  #menu .hot:hover { transform: scale(1.03); filter: brightness(1.1); }
  #menu .hot:active { transform: scale(.97); }
  #menu .hot.chat    { left: 2.5%;  top: 3%;   width: 23%;   height: 6.5%; }
  #menu .hot.wallet  { left: 74.5%; top: 3%;   width: 23.5%; height: 6.5%; }
  #menu .hot.b1v1    { left: 17.5%; top: 61%;  width: 29.5%; height: 22%; }
  #menu .hot.offline { left: 52%;   top: 61%;  width: 29.5%; height: 22%; }
  #menu .wallet-chip {
    position: absolute; left: 74.5%; top: 10.2%; width: 23.5%;
    text-align: center; color: #eafff6; font-size: clamp(9px, 1.7vw, 13px);
    font-weight: 800; text-shadow: 0 1px 3px #000; display: none; pointer-events: none;
  }
  #menu .wallet-chip.on { display: block; }

  /* ============ CHAT GLOBAL ============ */
  #chatPanel {
    position: fixed; z-index: 80; right: 0; top: 0; height: 100%;
    width: min(92vw, 380px); background: rgba(14,20,38,.97);
    border-left: 1px solid rgba(148,163,184,.25); color: #e2e8f0;
    display: flex; flex-direction: column;
    transform: translateX(0); transition: transform .28s ease;
    box-shadow: -8px 0 40px rgba(0,0,0,.5);
  }
  #chatPanel.hide { transform: translateX(105%); }
  .chat-head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 14px; font-weight: 800; border-bottom: 1px solid rgba(148,163,184,.2);
    background: linear-gradient(180deg,#1b2b4d,#101a33);
  }
  .chat-head .x { background: transparent; border: 0; color: #94a3b8; font-size: 18px; cursor: pointer; }
  .chat-msgs { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .chat-msg { background: rgba(30,41,59,.7); border-radius: 10px; padding: 7px 10px; font-size: 13px; line-height: 1.35; word-break: break-word; }
  .chat-msg.me { background: rgba(37,99,235,.28); }
  .chat-msg .who { font-weight: 800; color: #7dd3fc; font-size: 12px; }
  .chat-msg .time { color: #64748b; font-size: 10px; margin-left: 6px; }
  .chat-form { display: flex; gap: 8px; padding: 10px; border-top: 1px solid rgba(148,163,184,.2); }
  .chat-form input {
    flex: 1; padding: 9px 12px; border-radius: 10px; border: 1px solid rgba(148,163,184,.3);
    background: #0b1220; color: #e2e8f0; font-size: 14px; outline: none;
  }
  .chat-form button { padding: 9px 14px; border: 0; border-radius: 10px; cursor: pointer; font-weight: 700; background: linear-gradient(180deg,#38bdf8,#2563eb); color: #fff; }
  .chat-note { padding: 4px 12px 12px; font-size: 11px; color: #f59e0b; text-align: center; }

  /* ============ BATALLA 1v1 ============ */
  #onlinePanel { position: fixed; inset: 0; z-index: 70; display: grid; place-items: center; background: rgba(6,10,24,.8); backdrop-filter: blur(4px); }
  #onlinePanel.hide { display: none; }
  .ol-card {
    position: relative; width: min(92vw, 440px);
    background: linear-gradient(180deg,#16213e,#0d1428);
    border: 1px solid rgba(148,163,184,.28); border-radius: 20px;
    padding: 30px 26px 26px; text-align: center; color: #e2e8f0;
  }
  .ol-card .x { position: absolute; top: 10px; right: 14px; background: transparent; border: 0; color: #94a3b8; font-size: 20px; cursor: pointer; }
  .ol-card h2 { font-size: 24px; margin-bottom: 6px; }
  .ol-card p { color: #94a3b8; font-size: 13px; margin-bottom: 20px; min-height: 18px; }
  .ol-vs { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 24px; }
  .ol-player { display: flex; flex-direction: column; align-items: center; gap: 8px; font-weight: 700; font-size: 13px; }
  .ol-av { width: 64px; height: 64px; border-radius: 16px; background: #1e293b; border: 2px solid #38bdf8; display: grid; place-items: center; font-size: 30px; }
  .ol-av.foe { border-color: #f43f5e; opacity: .55; }
  .ol-vsx { font-size: 22px; font-weight: 900; color: #fbbf24; }
  .ol-find { width: 100%; padding: 13px; border: 0; border-radius: 12px; cursor: pointer; font-weight: 800; font-size: 16px; background: linear-gradient(180deg,#38bdf8,#2563eb); color: #fff; margin-bottom: 10px; }
  .ol-find:disabled { opacity: .5; cursor: default; }
  .ol-back { background: transparent; border: 0; color: #94a3b8; cursor: pointer; font-size: 13px; }
</style>
</head>
<body>
<div id="app"></div>

<!-- ============ MENÚ PRINCIPAL ============ -->
<div id="menu">
  <div class="menu-blur"></div>
  <div class="menu-frame">
    <button class="hot chat"    id="chatBtn"    aria-label="Abrir chat"></button>
    <button class="hot wallet"  id="walletBtn"  aria-label="Conectar wallet"></button>
    <div class="wallet-chip"    id="walletChip"></div>
    <button class="hot b1v1"    id="btn1v1"     aria-label="Batalla 1v1"></button>
    <button class="hot offline" id="btnOffline" aria-label="Modo offline"></button>
  </div>
</div>

<!-- ============ CHAT GLOBAL ============ -->
<div id="chatPanel" class="hide">
  <div class="chat-head">
    <span>💬 Chat global</span>
    <button id="chatClose" class="x" aria-label="Cerrar">✕</button>
  </div>
  <div id="chatMessages" class="chat-msgs"></div>
  <form id="chatForm" class="chat-form">
    <input id="chatInput" type="text" maxlength="200" placeholder="Escribe un mensaje…" autocomplete="off" />
    <button type="submit">Enviar</button>
  </form>
  <div class="chat-note" id="chatNote"></div>
</div>

<!-- ============ BATALLA 1v1 ============ -->
<div id="onlinePanel" class="hide">
  <div class="ol-card">
    <button id="onlineClose" class="x" aria-label="Cerrar">✕</button>
    <h2>⚔️ Batalla 1v1</h2>
    <p id="onlineStatus">Conecta tu wallet de Solana para jugar online.</p>
    <div class="ol-vs">
      <div class="ol-player"><div class="ol-av you">🙂</div><span id="olYou">Tú</span></div>
      <div class="ol-vsx">VS</div>
      <div class="ol-player"><div class="ol-av foe">❔</div><span id="olFoe">Rival</span></div>
    </div>
    <button id="onlineFind" class="ol-find">Buscar rival</button>
    <button id="onlineBack" class="ol-back">Volver al menú</button>
  </div>
</div>

<div id="loading">
  <div class="scene"></div>
  <div class="vig"></div>
  <div class="loadbar">
    <div class="track"><div class="fill" id="progress"></div></div>
    <div class="pct"><span id="loadtext">Loading</span><span class="dots"></span> <span id="pctnum"></span></div>
  </div>
</div>

<div id="hud">
  <span id="crowns"></span>
  <span id="timer">3:00</span>
  <span id="ver" style="color:#64748b;font-size:11px;font-weight:600">v9</span>
</div>
<div id="hint">Elige una carta del mazo</div>

<div id="bottombar">
  <div id="elixirWrap"><div id="elixirFill"></div><div id="elixirNum">5</div></div>
  <div id="deck"></div>
</div>

<div id="result">
  <div class="panel">
    <div id="resultText"></div>
    <button id="replay">Jugar otra vez</button>
  </div>
</div>

<script type="importmap">
  { "imports": { "three": "./lib/three.module.js" } }
</script>
<script type="module" src="./js/game.js?v=9"></script>
<script type="module" src="./js/menu.js?v=1"></script>
</body>
</html>
